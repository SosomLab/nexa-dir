name: CI

on:
  push:
    branches: [main]
    tags: ['*.*.*']   # 릴리스 태그 → 포터블 zip 산출(package job)
  pull_request:
  workflow_dispatch:   # 수동 패키징

permissions:
  contents: read

jobs:
  core:
    name: Rust 코어 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  license-gate:
    name: 라이선스 게이트 (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: core/Cargo.toml
          command: check licenses bans advisories

  viewmodels:
    name: ViewModels 테스트 (크로스플랫폼)
    runs-on: ubuntu-latest   # net8.0(플랫폼 무관) — 맥/Linux/Windows 공통 C# 로직 테스트(감사 B-1)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: test
        run: dotnet test app/Nexa.ViewModels.Tests -c Release

  app:
    name: WinUI 앱 빌드 (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable   # csproj가 cargo로 nexa-interop(cdylib) 빌드
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: restore
        run: dotnet restore app/Nexa.App
      - name: build
        run: dotnet build app/Nexa.App -c Release --no-restore

  # 포터블 zip(self-contained, docs/12 §4 PKG) — 태그 push·수동 실행 시만(평시 PR은 앱 빌드로 충분).
  # 후속: MSIX + 서명(secrets, docs/12 §6) → Releases 업로드
  package:
    name: 포터블 패키징 (windows)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: portable zip (win-x64)
        run: pwsh scripts/make-portable.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: portable-win-x64
          path: dist/*.zip
          if-no-files-found: error
